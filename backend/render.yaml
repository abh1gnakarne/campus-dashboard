services:
  - type: web
    name: campus-dashboard-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CALENDAR_API_KEY
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
